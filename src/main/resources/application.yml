spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration
    fail-on-missing-location: true
    repair: true
    baseline-on-migrate: true
    validate-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

server:
  port: 9091

app:
  limits:
    jedzenie: 500.00
    transport: 150.00
    rozrywka: 300.00